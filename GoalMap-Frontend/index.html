<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Goal Planner — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-brand">
      <div class="brand-icon">GP</div>
      <h1>AI Goal Planner</h1>
      <p>Your personalized roadmap to success</p>
    </div>

    <div class="auth-card">
      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Error / Success messages -->
      <div class="alert alert-error hidden" id="errorMsg"></div>
      <div class="alert alert-success hidden" id="successMsg"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          Login
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="hidden" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signupName" placeholder="Shiva Kumar" required />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signupEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6" />
        </div>
        <div class="form-group">
          <label>Current Skills</label>
          <textarea id="signupSkills" placeholder="e.g. Java, DSA, solved 200 LeetCode problems, final year CS student" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>Experience Level</label>
          <select id="signupLevel">
            <option value="BEGINNER">Beginner</option>
            <option value="INTERMEDIATE">Intermediate</option>
            <option value="ADVANCED">Advanced</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="signupBtn">
          Create Account
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
