server:
  port: 8080

spring:
  application:
    name: ai-goal-planner

  datasource:
    url: jdbc:postgresql://localhost:5432/goalplanner
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never   # we run schema.sql manually

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
          temperature: 0.7
          num-predict: 2048
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768          # nomic-embed-text output size
        initialize-schema: false

logging:
  level:
    com.aigoalplanner: DEBUG
    org.springframework.ai: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
